<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPG Skill Chart</title>
  <style>
    html, body {
      background: #191919 !important;
      background-color: #191919 !important;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    svg text { font-family: 'Segoe UI', sans-serif; }
  </style>
</head>
<body>
  <svg id="pentagon" viewBox="0 0 340 320" width="340" height="320" role="img" aria-label="Pentagon radar chart of RPG skill levels"></svg>

  <script>
    document.documentElement.style.backgroundColor = '#191919';
    document.body.style.backgroundColor = '#191919';

    const WORKER_URL = 'https://lingering-star-1a44.ilhampauza.workers.dev';

    const SKILLS = [
      { key: 'health level', label: 'Health' },
      { key: 'strength level', label: 'Strength' },
      { key: 'insight level', label: 'Insight' },
      { key: 'charisma level', label: 'Charisma' },
      { key: 'mental health level', label: 'Mental Health' },
    ];

    const CYAN = '#00e5ff';
    const CYAN_GRID = 'rgba(0, 229, 255, 0.15)';
    const CYAN_AXIS = 'rgba(0, 229, 255, 0.1)';
    const CYAN_AREA = 'rgba(0, 229, 255, 0.12)';
    const CYAN_STROKE = 'rgba(0, 229, 255, 0.85)';

    const N = 5, cx = 170, cy = 155, R = 115;
    function angle(i) { return (Math.PI * 2 * i / N) - Math.PI / 2; }
    function pt(r, i) { return [cx + r * Math.cos(angle(i)), cy + r * Math.sin(angle(i))]; }

    function drawChart(levels) {
      const svg = document.getElementById('pentagon');
      svg.innerHTML = '';
      const MAX = Math.max(10, ...levels.map(l => l + 3));

      for (let ring = 1; ring <= 6; ring++) {
        const frac = ring / 6;
        const pts = Array.from({length: N}, (_, i) => pt(R * frac, i).join(',')).join(' ');
        const el = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        el.setAttribute('points', pts);
        el.setAttribute('fill', ring === 6 ? 'rgba(0,229,255,0.03)' : 'none');
        el.setAttribute('stroke', CYAN_GRID);
        el.setAttribute('stroke-width', ring === 6 ? '1.5' : '0.8');
        svg.appendChild(el);
      }

      for (let i = 0; i < N; i++) {
        const [x, y] = pt(R, i);
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', cx); line.setAttribute('y1', cy);
        line.setAttribute('x2', x); line.setAttribute('y2', y);
        line.setAttribute('stroke', CYAN_AXIS);
        line.setAttribute('stroke-width', '1');
        svg.appendChild(line);
      }

      const areaPts = levels.map((v, i) => pt(R * Math.min(v / MAX, 1), i).join(',')).join(' ');
      const area = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      area.setAttribute('points', areaPts);
      area.setAttribute('fill', CYAN_AREA);
      area.setAttribute('stroke', CYAN_STROKE);
      area.setAttribute('stroke-width', '1.5');
      svg.appendChild(area);

      levels.forEach((v, i) => {
        const [x, y] = pt(R * Math.min(v / MAX, 1), i);
        const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('cx', x); c.setAttribute('cy', y); c.setAttribute('r', '3.5');
        c.setAttribute('fill', CYAN);
        c.setAttribute('filter', 'drop-shadow(0 0 4px rgba(0,229,255,0.8))');
        svg.appendChild(c);
      });

      SKILLS.forEach((s, i) => {
        const [x, y] = pt(R + 22, i);
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', x);
        text.setAttribute('y', y);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'middle');
        text.setAttribute('font-size', '11');
        text.setAttribute('font-family', 'Segoe UI, sans-serif');
        text.setAttribute('fill', 'rgba(0,229,255,0.7)');
        text.setAttribute('letter-spacing', '0.05em');
        text.textContent = s.label;
        svg.appendChild(text);
      });
    }

    async function fetchData() {
      try {
        const res = await fetch(WORKER_URL);
        const data = await res.json();
        const props = data.results[0].properties;

        const levels = SKILLS.map(s => {
          const key = Object.keys(props).find(k => k.toLowerCase() === s.key);
          if (!key) return 1;
          const p = props[key];
          if (p.type === 'formula') return Math.max(1, Math.round(p.formula.number || 1));
          if (p.type === 'number') return Math.max(1, p.number || 1);
          return 1;
        });

        drawChart(levels);
      } catch (e) {
        drawChart([1, 1, 1, 1, 1]);
      }
    }

    fetchData();
  </script>
</body>
</html>
